<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Tasks - Todo App</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container todo-container">
    <div class="todo-header">
      <div class="header-left">
        <h1>My Tasks</h1>
        <p class="subtitle">Stay organized and productive</p>
      </div>
      <div class="user-pill">
        <span id="user-name">User</span>
        <button id="logout-btn" class="logout-pill">Logout</button>
      </div>
    </div>

    <div class="todo-input-container">
      <div class="todo-input-row">
        <input type="text" id="todo-input" placeholder="What needs to be done?">
        <div class="input-divider"></div>
        <input type="date" id="todo-deadline" title="Set Deadline">
        <button id="add-todo-btn">Add Task</button>
      </div>
    </div>

    <ul class="todo-list" id="todo-list">
      <!-- Todos will be injected here -->
    </ul>
  </div>

  <!-- Custom Confirmation Modal -->
  <div id="confirm-modal" class="modal">
    <div class="modal-content">
      <h3>Delete Task?</h3>
      <p>Are you sure you want to remove this task? This action cannot be undone.</p>
      <div class="modal-actions">
        <button id="cancel-delete" class="secondary-btn">Cancel</button>
        <button id="confirm-delete" class="danger-btn">Delete</button>
      </div>
    </div>
  </div>

  <script src="js/todo.js"></script>
</body>
</html>
